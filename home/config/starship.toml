[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust bold"
format = '[$user]($style)'

[hostname]
format = '[@$hostname ](bg:red fg:crust)'
ssh_only = false
# ssh_symbol = "@" # \ue36e 'оҚ®' # 'п…ҪвҮ’' # 'пЈ· ' # 'п¬ҒвҮ’'
# trim_at = '.companyname.com'
disabled = false

[fill]
symbol = ' '
style = 'bold subtext1'

[directory]
style = "bg:peach fg:crust"
format = '[$path]($style)[$read_only]($read_only_style)'
truncation_length = 3
truncation_symbol = "~/"
read_only = ' рҹ”’'
read_only_style = 'bg:peach'

[git_branch]
symbol = "пҗҳ"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_commit]
format = '[\($hash$tag\)]($style)[ ]()'
style = 'bg:yellow'
commit_hash_length = 8
tag_symbol = " \uf412 " # \uf412 ' пҗ’ ' # ' пҖ« ''
tag_disabled = false
disabled = false

[git_metrics]
format = '[\[+$added/]($added_style)[-$deleted\]]($deleted_style)[ ](bg:yellow)'
added_style = 'bg:yellow fg:crust'
deleted_style = 'bg:yellow fg:crust'
disabled = false

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "оҳһ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "оү– "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[direnv]
symbol = " у°·Ң "
style = "fg:crust bg:sapphire"
format = '[$symbol$loaded/$allowed]($style)'
disabled = false

[conda]
symbol = " п„Ң "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[status]
format = "[$symbol $status $hex_status( \uf0a2 $signal_number-$signal_name)]($style)" # \uf0a2 п–ӣ , \ueaa2
#format = "[$symbol $status ]($style)" # \uf0a2 п–ӣ , \ueaa2
style = 'fg:crust bg:red'
success_symbol = '' # 'вң”'
symbol = " \u2717" # \u2717 \uf467 \uebde оҜһ вңҳ
disabled = false
map_symbol = false

[time]
format = "[ $time пҖ—]($style)"
style = 'bg:lavender fg:crust'
disabled = false # set to 'false', if you want to see the time

[cmd_duration]
show_milliseconds = true
format = "[ took [$duration ](bold fg:crust bg:mauve)](fg:crust bg:mauve)"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[character]
disabled = false
success_symbol = '[вқҜ](bold fg:green)'
error_symbol = '[вңҳ](bold fg:red)'
vimcmd_symbol = '[вқ®](bold fg:green)'
vimcmd_replace_one_symbol = '[вқ®](bold fg:lavender)'
vimcmd_replace_symbol = '[вқ®](bold fg:lavender)'
vimcmd_visual_symbol = '[вқ®](bold fg:yellow)'
